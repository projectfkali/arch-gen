changelog:
  categories:
    - title: "Breaking Changes"
      labels:
        - "breaking"
    - title: "Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "Maintenance"
      labels:
        - "chore"
        - "ci"
        - "docs"
    - title: "Other"
      labels:
        - "*"

